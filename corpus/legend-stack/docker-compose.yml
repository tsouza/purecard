# Self-hosted Legend stack for the SQL=>Pure curated-dataset pipeline
# (docs/design/sql-to-pure-datagen.md §3). Pinned versions; never the private instance.
# Usage: docker compose -f infra/legend-stack/docker-compose.yml up -d
services:
  legend-engine:
    image: finos/legend-engine-server-http-server:4.113.0
    platform: linux/amd64
    container_name: legend-stack-engine
    command:
      - /bin/sh
      - -c
      - >-
        java -cp /app/bin/*-shaded.jar -XX:+ExitOnOutOfMemoryError -XX:MaxRAMPercentage=60
        -Xss4M -Dfile.encoding=UTF8 org.finos.legend.engine.server.Server server
        /config/engine-config.yml
    ports:
      - "6300:6300"
    volumes:
      - ./engine-config.yml:/config/engine-config.yml:ro
      - legend-stack-dbs:/dbs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6300/api/server/v1/info > /dev/null"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 10

  legend-sdlc:
    image: finos/legend-sdlc-server-fs:0.195.0
    platform: linux/amd64
    container_name: legend-stack-sdlc
    command:
      - /bin/sh
      - -c
      - >-
        java -cp /app/bin/*.jar -XX:+ExitOnOutOfMemoryError -XX:MaxRAMPercentage=60
        -Xss4M -Dfile.encoding=UTF8 org.finos.legend.sdlc.server.startup.LegendSDLCServerFS
        server /config/sdlc-config.yml
    ports:
      - "6100:6100"
    volumes:
      - ./sdlc-config.yml:/config/sdlc-config.yml:ro
      - legend-stack-sdlc-data:/data/sdlc
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6100/api/info > /dev/null"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  legend-stack-dbs:
  legend-stack-sdlc-data:
