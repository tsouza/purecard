# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
#
# Make CodeRabbit review against this repo's constitution + engineering
# methodology. The deterministic gates (rustfmt, clippy -D warnings, ast-grep,
# cargo-deny, markdownlint, cargo-mutants) already enforce the mechanical rules;
# CodeRabbit's job is the JUDGMENT those gates cannot make. Authoritative rules:
# constitution.md and docs/methodology/ — pointed at below via code_guidelines.

language: en-US

tone_instructions: >-
  Terse, high-signal. Enforce constitution.md and docs/methodology/; cite the
  rule. Skip style nits already caught by rustfmt, clippy, ast-grep, or
  markdownlint. No praise, no filler.

reviews:
  profile: assertive
  # Let CodeRabbit's review actually gate: when it finds issues it opens a
  # "changes requested" review, so its status check fails until resolved. This
  # is what makes the required "CodeRabbit" check meaningful rather than
  # advisory (it is added to branch protection once it first reports on a PR).
  request_changes_workflow: true
  auto_review:
    enabled: true
    auto_incremental_review: true
  path_instructions:
    - path: "**/*.rs"
      instructions: |
        Enforce constitution.md; cite the rule you invoke. Prioritise the
        judgment calls the linters do NOT make:
        - No magic constants: flag any literal that should be a named const or
          config. (rustfmt/clippy do not catch this — it is your highest-value
          check.)
        - Comment economy: comments explain WHY for genuinely exotic logic only.
          Flag narrating comments, commented-out code, or a comment that only
          exists because the code is unclear (fix the code instead).
        - Decoder purity (constitution §1): the decoder core has no I/O, async,
          network, or framework deps and never calls the Legend engine (the host
          supplies Vocab/Schema). The feature-gated PyO3 `ffi` module is the only
          non-pure surface. Flag violations of the intent, not only imports.
        - "Fix the system, not the instance": a bug fix must also add the test,
          lint, or rule that kills the whole class. Flag a fix that only patches
          the single instance.
        - DRY/KISS: duplicated logic or incidental complexity is a defect.
        - A new dependency must clear the vetting rubric
          (docs/methodology/overview.md), be a pinned latest-stable version, and
          lose to a crate already in the lockfile or to bespoke code when either
          suffices.
        - Test discipline (§3, PROTECTED): no #[ignore], no skipped tests, never
          weaken or delete an assertion to pass CI; flag timing/ordering
          assumptions that could flake.
        Only add unwrap/expect/panic!/todo!/unimplemented!/dbg! findings that
        ast-grep's own rule would miss (e.g. a subtle boundary case); do not
        restate what a green gate already enforces.
    - path: "{xtask/**,scripts/**,justfile,lefthook.yml,.github/workflows/**,**/*.mjs}"
      instructions: |
        Enforce constitution.md §2 (change discipline) on automation & CI:
        - No shell scripts, and no non-trivial inline shell (branching, loops,
          pipes). Automation is, in order: a `just` target / `cargo xtask`
          subcommand; a first-party GitHub Action step; a Bun `.mjs`.
        - Portable automation: favor a built-in / in-process function over
          shelling out to a platform-specific binary (hash with a Rust crate,
          not `sha256sum`; parse in Rust, not sed/awk). A gate that only runs on
          the maintainer's OS is a portability bug.
        - Cache or mirror any third-party fetch in CI (`actions/cache` on the
          version key, or a mirror); never a bare uncached `curl` on every run.
        - Gates run clean: no unaddressed tool warnings (the `-D warnings`
          standard extends to every tool a gate runs).
        - Pin tools/actions to a looked-up latest-stable version; a second Rust
          toolchain declaration that fights rust-toolchain.toml is a defect.
        - Every gate reproduces in CI and leans on no local-only state (a
          branch's upstream, full history, an interactive tool).
    - path: "docs/**/*.md"
      instructions: |
        Enforce the repo's honesty ethos. Flag over-claims: a design marked
        DECIDED/VALIDATED without evidence, "proven" where only "provisional"
        holds, a benchmark number without a cited source. A decision that
        finalises should graduate to an ADR / constitution rule / domain-model
        entry. Keep prose terse; no filler.

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "constitution.md"
      - "CLAUDE.md"
      - "docs/methodology/**"
      - "docs/decisions/**"
      - "docs/lessons.md"
  learnings:
    scope: auto
