# markdownlint-cli2 options. Rule config lives in .markdownlint.yaml (auto-read).
# Excludes vendored / generated trees so local runs match CI's clean checkout.
globs:
  - "**/*.md"
ignores:
  - "node_modules/**"
  - "target/**"
  - "gen/**"
  # Inherited, verbatim inputs — the relocated master spec and the committed test
  # corpus — are content kept as-is, not repo-authored prose maintained to our
  # markdown style (EBNF fences, emoji tables, escaped-pipe tables the aligner
  # can't normalize). docs/spec/README.md is our own index and stays linted.
  # See .markdownlintignore for the rationale.
  - "docs/spec/overview.md"
  - "docs/spec/architecture.md"
  - "docs/spec/grammar.md"
  - "docs/spec/schema.md"
  - "docs/spec/testing.md"
  - "corpus/**"
