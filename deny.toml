# cargo-deny configuration — supply-chain policy gate (`just deny`).
#
# Four independent checks: advisories, licenses, bans, and sources. All are
# hard-fail in CI. This is PROTECTED config: an agent may tighten it (add
# denials, drop allowed licenses) but loosening requires human sign-off.

[graph]
# Evaluate the tree for all targets so we don't miss platform-specific deps.
all-features = true

# ---------------------------------------------------------------------------
# Security advisories (RustSec). Any known-vulnerable dep fails the build.
# ---------------------------------------------------------------------------
[advisories]
version = 2
yanked = "deny"
# Add specific advisory IDs here (with a justification comment) only when a
# fix is genuinely unavailable — never as a convenience.
ignore = [
    # `paste` is unmaintained (informational advisory, no known vulnerability). It
    # is a transitive dep of `tokenizers`, which is itself an OPTIONAL, feature-gated
    # (`qwen-oracle`), test-only dependency that never ships in the published core or
    # the default build. tokenizers still pulls it, so no upstream fix is available;
    # the advisory is accepted only for that isolated, on-demand real-Qwen oracle tree.
    "RUSTSEC-2024-0436",
]

# ---------------------------------------------------------------------------
# Licenses. Explicit allow-list; anything not listed fails.
# ---------------------------------------------------------------------------
[licenses]
version = 2
# The allow-list below is deliberately broader than the current (tiny) tree
# uses, so it stays stable as decoder/PyO3 deps land. Don't warn on an allowed
# license that no crate happens to pull yet — that is forward-looking config,
# not rot.
unused-allowed-license = "allow"
# SPDX identifiers permitted in the dependency tree. Permissive + our own.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
]
# Copyleft or ambiguous licenses are simply absent from the allow-list, so
# they fail closed. Require high confidence when inferring a license.
confidence-threshold = 0.9

# ---------------------------------------------------------------------------
# Bans. Duplicate versions, wildcard deps, and layering violations.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Reject wildcard versions on published/external deps; intra-workspace path
# deps (if any) are exempt.
allow-wildcard-paths = true

# Crates hard-banned from the tree everywhere. Empty for now; add
# `{ name = "..." }` with a justification comment when a dependency must never
# be pulled in.
deny = []

# Crates whose duplicate versions are tolerated (transitive churn).
skip = []

# ---------------------------------------------------------------------------
# Sources. Only crates.io and our own git remotes are trusted.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
# No git source is in the workspace dependency graph yet, so none is allowed.
# The `lints` dylint crate (excluded from the workspace, so not traversed by
# `cargo deny check`) needs rust-clippy's git `clippy_utils`; re-add
# "https://github.com/rust-lang/rust-clippy" here if a *checked* crate ever
# takes a git dependency.
allow-git = []
