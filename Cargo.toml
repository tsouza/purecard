[package]
name = "purecard"
description = "Grammar- and schema-constrained decoder for Legend Pure: masks a language model's logits so generated queries are valid — and schema-consistent — by construction, in a single forward pass."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
readme = "README.md"
keywords = ["constrained-decoding", "grammar", "llm", "legend", "pure"]
categories = ["parser-implementations", "text-processing"]
# Ship only the library in the published crate — not the 4.7 MB test corpus, the
# docs tree (the spec lives under docs/spec/), or the repo's CI/automation.
include = ["src/**/*", "README.md", "LICENSE"]

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json.workspace = true
thiserror = "2.0.18"
# `engine` feature only — the live-HTTP Legend client boundary. The engine is a
# local, plain-HTTP service (http://localhost:6300), so TLS is disabled
# (`default-features = false`): no rustls/ring/webpki-roots tree, smaller and
# license-clean. `json` enables `send_json` / `Body::read_json` for the POST.
anyhow = { version = "1", optional = true }
ureq = { version = "3.3.0", default-features = false, features = ["json"], optional = true }

[workspace]
resolver = "3"
members = ["xtask"]
# `lints` is a dylint library (links `clippy_utils`, needs rustc_private +
# nightly); it is built out-of-band via `cargo dylint`, never by a stable
# `cargo build`, so it is excluded from the workspace.
exclude = ["lints"]

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "Apache-2.0"
authors = ["Thiago Souza <tcostasouza@gmail.com>"]
repository = "https://github.com/tsouza/purecard"
# 1.88: the `engine` feature's HTTP client (ureq → cookie_store → time) needs the
# security-patched `time` >= 0.3.47 (RUSTSEC-2026-0009), which requires 1.88. The
# default-feature crate builds on less, but the package declares one MSRV.
rust-version = "1.88"

[workspace.dependencies]
# Shared by the `xtask` dev/CI orchestrator. The `purecard` crate itself is
# dependency-free at M0; decoder deps land with the milestones (see docs/spec/).
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
opt-level = 3

[features]
# The engine-backed completeness lane (opt-in): a live-HTTP Legend client.
# Off by default so the crate builds hermetic and dep-light; enabled for the
# nightly/on-demand completeness tests via `just test-engine`.
engine = ["dep:ureq", "dep:anyhow"]
