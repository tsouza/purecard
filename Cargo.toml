[package]
name = "purecard"
description = "Grammar- and schema-constrained decoder for Legend Pure: masks a language model's logits so generated queries are valid â€” and schema-consistent â€” by construction, in a single forward pass."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
readme = "README.md"
keywords = ["constrained-decoding", "grammar", "llm", "legend", "pure"]
categories = ["parser-implementations", "text-processing"]
# Ship only the library in the published crate â€” not the 4.7 MB test corpus, the
# docs tree (the spec lives under docs/spec/), or the repo's CI/automation. The
# leading `/` anchors each file to the package root: an unanchored `README.md`
# glob matches at any depth (gitignore semantics) and would drag `corpus/README.md`
# into the tarball â€” exactly what `just check-core-deplight` guards against.
include = ["src/**/*", "/README.md", "/LICENSE"]

[dependencies]
# Empty by design: the published M0 core is `GuaranteeLevel` (lib.rs) + `Vocab`
# (vocab.rs), both pure `std`, so `purecard` ships with zero runtime dependencies.
# All oracle-harness code lives under `tests/` on `[dev-dependencies]` (ADR-0003);
# `cargo xtask check-core-deplight` enforces this table stays empty.

[dev-dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json.workspace = true
thiserror = "2.0.18"
anyhow.workspace = true
# The `legend` lane's live-HTTP Legend client boundary. The engine is a local,
# plain-HTTP service (http://localhost:6300), so TLS is disabled
# (`default-features = false`): no rustls/ring/webpki-roots tree, smaller and
# license-clean. `json` enables `send_json` / `Body::read_json` for the POST.
ureq = { version = "3.3.0", default-features = false, features = ["json"] }

[workspace]
resolver = "3"
members = ["xtask"]
# `lints` is a dylint library (links `clippy_utils`, needs rustc_private +
# nightly); it is built out-of-band via `cargo dylint`, never by a stable
# `cargo build`, so it is excluded from the workspace.
exclude = ["lints"]

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "Apache-2.0"
authors = ["Thiago Souza <tcostasouza@gmail.com>"]
repository = "https://github.com/tsouza/purecard"
# 1.88: the `legend` lane's dev-only HTTP client (ureq â†’ cookie_store â†’ time)
# needs the security-patched `time` >= 0.3.47 (RUSTSEC-2026-0009), which requires
# 1.88. The published core builds on less, but the package declares one MSRV.
rust-version = "1.88"

[workspace.dependencies]
# Shared by the `xtask` dev/CI orchestrator. The `purecard` crate itself is
# dependency-free at M0; decoder deps land with the milestones (see docs/spec/).
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
opt-level = 3

[features]
# The Legend-backed completeness lane (opt-in): compiles the live-HTTP client in
# `tests/support/legend.rs` and collects `tests/legend_completeness.rs`. A bare
# cfg flag â€” `ureq`/`anyhow` are unconditional `[dev-dependencies]`, so a feature
# cannot use `dep:` on them. Off by default so `just ci` stays hermetic; enabled
# for the nightly/on-demand completeness tests via `just test-legend`.
legend = []
