[package]
name = "purecard"
description = "Grammar- and schema-constrained decoder for Legend Pure: masks a language model's logits so generated queries are valid ‚Äî and schema-consistent ‚Äî by construction, in a single forward pass."
edition.workspace = true
version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
rust-version.workspace = true
readme = "README.md"
keywords = ["constrained-decoding", "grammar", "llm", "legend", "pure"]
categories = ["parser-implementations", "text-processing"]
# Ship only the library in the published crate ‚Äî not the 4.7 MB test corpus, the
# docs tree (the spec lives under docs/spec/), or the repo's CI/automation. The
# leading `/` anchors each file to the package root: an unanchored `README.md`
# glob matches at any depth (gitignore semantics) and would drag `corpus/README.md`
# into the tarball ‚Äî exactly what `just check-core-deplight` guards against.
include = ["src/**/*", "/README.md", "/LICENSE"]

# The core's dependency allowlist (ADR-0004, M1): `thiserror` only. `DecodeError`
# (src/error.rs), the byte-PDA's error type, ships in the crate and the
# constitution (¬ß1) mandates `thiserror` for library error types ‚Äî the core's
# first, anticipated runtime dependency. `cargo xtask check-core-deplight`
# enforces `[dependencies] ‚äÜ { thiserror }`, so any other runtime dep still fails
# the gate. Oracle-harness deps stay under `[dev-dependencies]` (ADR-0003).
[dependencies]
thiserror = "2.0.18"

[dev-dependencies]
serde = { version = "1.0.228", features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
# The `legend` lane's live-HTTP Legend client boundary. The engine is a local,
# plain-HTTP service (http://localhost:6300), so TLS is disabled
# (`default-features = false`): no rustls/ring/webpki-roots tree, smaller and
# license-clean. `json` enables `send_json` / `Body::read_json` for the POST.
ureq = { version = "3.3.0", default-features = false, features = ["json"] }
# M2 mask testing (dev-only, so `check-core-deplight`'s `[dependencies] ‚äÜ
# {thiserror}` gate is untouched). `proptest` drives the ¬ß8.5 rollback/equivalence
# properties from committed seeds (`proptest-regressions/`); `criterion` measures
# `allowed_mask` latency (`benches/allowed_mask.rs`). Criterion runs with
# `default-features = false` ‚Äî no plotters/gnuplot/rayon tree, just the
# `cargo_bench_support` harness needed for `harness = false` benches.
proptest = "1.11.0"
criterion = { version = "0.8.2", default-features = false, features = ["cargo_bench_support"] }

# The M2 mask-latency benchmark (¬ß4, G3). `harness = false` hands `main` to
# criterion; `just bench` (`cargo bench --workspace`) picks it up.
[[bench]]
name = "allowed_mask"
harness = false

[workspace]
resolver = "3"
members = ["xtask"]
# `lints` is a dylint library (links `clippy_utils`, needs rustc_private +
# nightly); it is built out-of-band via `cargo dylint`, never by a stable
# `cargo build`, so it is excluded from the workspace.
exclude = ["lints"]

[workspace.package]
edition = "2024"
version = "0.1.1"
license = "Apache-2.0"
authors = ["Thiago Souza <tcostasouza@gmail.com>"]
repository = "https://github.com/tsouza/purecard"
# 1.88: the `legend` lane's dev-only HTTP client (ureq ‚Üí cookie_store ‚Üí time)
# needs the security-patched `time` >= 0.3.47 (RUSTSEC-2026-0009), which requires
# 1.88. The published core builds on less, but the package declares one MSRV.
rust-version = "1.88"

[workspace.dependencies]
# Shared by the `xtask` dev/CI orchestrator. The `purecard` crate itself is
# dependency-free at M0; decoder deps land with the milestones (see docs/spec/).
anyhow = "1"
clap = { version = "4", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1

[profile.bench]
opt-level = 3

[features]
# The Legend-backed completeness lane (opt-in): compiles the live-HTTP client in
# `tests/support/legend.rs` and collects `tests/legend_completeness.rs`. A bare
# cfg flag ‚Äî `ureq`/`anyhow` are unconditional `[dev-dependencies]`, so a feature
# cannot use `dep:` on them. Off by default so `just ci` stays hermetic; enabled
# for the nightly/on-demand completeness tests via `just test-legend`.
legend = []
