name: CI

# Thin CI: the fast lane is `cargo xtask ci` (typed, testable orchestration in
# Rust). Heavier / specialized gates run as parallel jobs so they can use their
# own tooling and caching. Every gate here has a matching `just` target and
# vice-versa.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read   # dorny/paths-filter reads changed files via the PR API

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Path filter: gate code jobs so doc-only PRs skip them ----------------
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        # fetch-depth: 0 so paths-filter can diff a push against its base commit
        # locally; persist-credentials: false means it cannot fetch the base
        # over the network, and a depth-1 checkout lacks it.
        with: { persist-credentials: false, fetch-depth: 0 }
      - name: Filter changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - 'src/**'
              - 'xtask/**'
              - 'lints/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'deny.toml'
              - 'clippy.toml'
              - 'rust-toolchain.toml'
              - '.mise.toml'
              - 'rustfmt.toml'
              - 'public-api/**'
              - '.config/nextest.toml'
              - 'ast-grep-rules/**'
              - 'sgconfig.yml'
              - 'scripts/**'
              - 'release-plz.toml'
              # The doc-fact gate (cargo xtask check-doc-facts) reads these, so a
              # doc/corpus edit that drifts from its source must trigger the lane.
              - 'README.md'
              - 'docs/**'
              - 'corpus/gold_queries.jsonl'
              - '.github/workflows/ci.yml'

  # --- Primary gate: fmt + lint + build + all nextest layers via xtask -----
  check:
    name: xtask ci (fmt, lint, test)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      # sccache keys on compiler invocation, not on incremental fingerprints;
      # leaving incremental on defeats its cache hits (see mozilla/sccache#465).
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # No dtolnay/rust-toolchain step anywhere in this file: rust-toolchain.toml
      # already pins stable + rustfmt/clippy/rust-src, and rustup auto-installs
      # it on the first cargo/rustup call. A second `rustup default` from the
      # action would fight the file over which one wins, surfacing rustup's
      # "implicitly overridden" warning on every invocation for no behavioral
      # difference.
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `cargo xtask ci`'s `clippy --all-features` now compiles the `python`
      # feature (the M4 PyO3 boundary), so pyo3's build script needs a Python
      # interpreter on PATH. abi3-py39 makes the exact version irrelevant.
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install cargo-nextest
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-nextest
      - name: cargo xtask ci
        run: cargo xtask ci

  # --- Coverage floor (cargo-llvm-cov) -------------------------------------
  coverage:
    name: coverage
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # rust-toolchain.toml supplies the stable channel; only the
      # coverage-specific component is missing from it.
      - name: Add llvm-tools-preview
        run: rustup component add llvm-tools-preview
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install coverage tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - name: Coverage + floor enforcement
        run: cargo xtask coverage

  # --- Mutation testing (cargo-mutants) ------------------------------------
  mutation:
    name: mutation
    needs: changes
    # Mutation runs are expensive (~10 min parallelised; see CARGO_MUTANTS_JOBS
    # and timeout-minutes below). Run them at MERGE TIME — the merge
    # queue (`merge_group`) and pushes to `main` — not on every PR iteration, so
    # a PR's inner loop isn't gated on the slowest job. Mutation gates the trunk:
    # with a merge queue it runs before the change lands; without one it runs on
    # `main` immediately after. Locally, `just test-mutation` still runs it per
    # change. (Scoped down deliberately by the maintainer; only ratchet tighter.)
    if: >-
      needs.changes.outputs.code == 'true' &&
      (github.event_name == 'merge_group' || github.event_name == 'push')
    runs-on: ubuntu-latest
    # Bound the run so a hung mutant fails cleanly instead of riding the runner's
    # edge (the serial ~18 min run was killed mid-queue once); comfortably above
    # the parallelised wall-clock below.
    timeout-minutes: 30
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
      # Run 2 mutants in parallel. ubuntu-latest has 4 vCPUs and each mutant's own
      # cargo build already threads across them, so 2 concurrent scenarios is the
      # sweet spot (cargo-mutants oversubscribes past that) — it roughly halves the
      # serial ~18 min wall-clock that rode the job's edge and got signalled.
      CARGO_MUTANTS_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install mutation tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-mutants,cargo-nextest,just
      - name: cargo mutants
        run: just test-mutation
      - name: Upload mutants report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutants-out
          path: mutants.out

  # --- PR mutation gate: mutate only the lines this PR changed ---------------
  mutation-pr:
    name: mutation (changed lines)
    needs: changes
    # The fast per-PR counterpart to the merge-time `mutation` job. That job runs
    # the full suite and only at merge time, so a change that adds under-tested
    # logic first reddens the *trunk*, post-merge (exactly how #26's scope mutants
    # surfaced). This job mutates only the lines the PR touches
    # (`cargo mutants --in-diff`), so the same 0-missed / 0-timeout standard fails
    # the PR pre-merge. Bounded to the diff, so it stays quick.
    if: >-
      needs.changes.outputs.code == 'true' &&
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # --in-diff keeps the mutant set small, but bound it like the full job so a
    # hung mutant fails cleanly instead of riding the runner's edge.
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
      CARGO_MUTANTS_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full history so the merge-base diff against origin/main resolves.
          fetch-depth: 0
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install mutation tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-mutants,cargo-nextest,just
      # Land origin/main as a tracking ref (checkout's narrow refspec omits it) so
      # the recipe's merge-base diff resolves.
      - name: Fetch base ref
        run: git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
      - name: cargo mutants (changed lines)
        run: just test-mutation-diff
      - name: Upload mutants report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutants-out-pr
          path: mutants.out
          # A no-Rust-in-diff PR produces no mutants.out; that's a clean pass, not
          # a warning (the default `warn` trips the no-warnings log sweep).
          if-no-files-found: ignore

  # --- Supply chain: deny + audit + unused deps ----------------------------
  supply-chain:
    name: deny / audit / unused-deps
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install supply-chain tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-deny,cargo-audit,cargo-machete,just
      - name: cargo deny
        run: just deny
      - name: cargo audit
        run: just audit
      - name: cargo machete (unused deps)
        run: just machete
      # Fail a PR on release-plz config drift instead of the post-merge trunk
      # run (release-plz.yml only fires on push to main).
      - name: release-plz config check
        run: just release-plz-check

  # --- API stability: semver-checks + public-api snapshot ------------------
  # Both gates need a prior published baseline: semver-checks compares against
  # the last crates.io release, public-api against a committed snapshot. Neither
  # exists until purecard's first release, so the whole job is opt-in. Enable
  # each with a repo variable once its baseline exists:
  #   * SEMVER_ENABLED=true       — after the first crates.io publish.
  #   * PUBLIC_API_ENABLED=true   — after `just public-api-bless` is committed.
  api-stability:
    name: semver / public-api
    needs: changes
    if: >-
      needs.changes.outputs.code == 'true' &&
      (vars.SEMVER_ENABLED == 'true' || vars.PUBLIC_API_ENABLED == 'true')
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install API-stability tools
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-semver-checks,cargo-public-api,just
      - name: cargo semver-checks
        if: ${{ vars.SEMVER_ENABLED == 'true' }}
        run: just semver
      # public-api needs a nightly toolchain (rustdoc JSON) and a committed
      # baseline snapshot. Generate it with `just public-api-bless`, commit it,
      # then set PUBLIC_API_ENABLED=true.
      - name: Install nightly (for cargo public-api)
        if: ${{ vars.PUBLIC_API_ENABLED == 'true' }}
        uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
      - name: public API snapshot
        if: ${{ vars.PUBLIC_API_ENABLED == 'true' }}
        run: cargo xtask public-api

  # --- Structural rules + postponed-marker gate (ast-grep) -----------------
  structural:
    name: ast-grep / postponed-markers
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # The doc-fact gate compiles `xtask`, so share the same sccache setup the
    # other cargo-building jobs use (constitution §2 — reuse the cache).
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Install ast-grep
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: ast-grep
      - name: ast-grep structural rules
        run: ast-grep scan
      - name: Postponed-marker gate
        run: bun scripts/checks/postponed-markers.mjs --all
      - name: Stale self-description gate
        run: bun scripts/checks/stale-selfdescription.mjs --all
      - name: Doc-fact assertions
        run: cargo xtask check-doc-facts

  # --- Docs build (missing-docs is a hard error) ---------------------------
  docs:
    name: docs
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # `just docs` runs `cargo doc --all-features`, which documents the `python`
      # feature (the M4 PyO3 boundary) and so builds pyo3 — its build script needs
      # a Python interpreter on PATH.
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install just
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: just
      - name: cargo doc (warnings denied)
        run: just docs

  # --- Performance regression via CodSpeed (criterion benches) -------------
  bench:
    name: bench (codspeed)
    needs: changes
    # Skips until CodSpeed is set up AND benchmarks exist (M2): install the
    # CodSpeed GitHub App on the repo, add benches, then set repo variable
    # CODSPEED_ENABLED=true. Auth is via OIDC, no secret required. A skipped job
    # does not block required-check branch rules.
    if: needs.changes.outputs.code == 'true' && vars.CODSPEED_ENABLED == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read      # actions/checkout
      id-token: write     # OIDC auth to CodSpeed (no static token needed)
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up sccache
        uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-codspeed
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-codspeed
      - name: Build benchmarks
        run: cargo codspeed build --workspace
      - name: Run benchmarks under CodSpeed
        uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
        with:
          run: cargo codspeed run

  # --- Warnings-are-errors net (constitution §2) --------------------------
  # clippy/rustdoc fail on their own warnings via `-D warnings`, but tools with no
  # native -Werror (docker build, apt, useradd, …) can warn while exiting 0. This
  # sweeps the whole run's logs so no such warning slips through a green run —
  # every job at once, not a per-step patch. Runs after everything (their logs
  # must exist); `always()` so it also catches warnings in a job that failed.
  no-warnings:
    name: no-warnings (log sweep)
    needs: [changes, check, coverage, mutation, mutation-pr, supply-chain, api-stability, structural, docs, bench]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Sweep the run's logs for tool warnings
        env:
          GH_TOKEN: ${{ github.token }}
        run: bun scripts/checks/no-ci-warnings.mjs

  # --- Aggregate gate: the single required check ---------------------------
  ci-gate:
    name: ci-gate
    needs: [changes, check, coverage, mutation, mutation-pr, supply-chain, api-stability, structural, docs, bench, no-warnings]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any code job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
