name: Wheels

# The M4 Python wheel lane. Builds the abi3 maturin wheel (src/ffi.rs behind the
# `python` feature) on every PR / merge-queue entry that touches Rust or packaging
# files — the pre-merge counterpart (constitution §2) that proves the wheel still
# builds before a change lands, not only after. Publishing to PyPI is HELD: it
# runs only on a published GitHub release tag, and the release itself is deferred
# until the project is feature-complete.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  release:
    types: [published]

concurrency:
  group: wheels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read # dorny/paths-filter reads changed files via the PR API

env:
  CARGO_TERM_COLOR: always

jobs:
  # --- Path filter: skip the build on doc-only PRs (never on a release) ------
  changes:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    outputs:
      wheel: ${{ steps.filter.outputs.wheel }}
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            wheel:
              - '**/*.rs'
              - 'src/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'pyproject.toml'
              - 'rust-toolchain.toml'
              - '.github/workflows/wheels.yml'

  # --- Build the abi3 wheel (pre-merge gate; artifact feeds the publish job) --
  build:
    needs: changes
    # Always on a release; otherwise only when Rust / packaging files changed.
    if: >-
      always() &&
      (github.event_name == 'release' || needs.changes.outputs.wheel == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with: { persist-credentials: false }
      # First-party, self-caching Action (constitution §2: prefer official
      # Actions; cache third-party fetches). Builds inside a manylinux container
      # whose rustup honours rust-toolchain.toml. One abi3 wheel for CPython >= 3.9.
      - uses: PyO3/maturin-action@v1.51.0
        with:
          command: build
          args: --release --features python --strip
          manylinux: auto
          sccache: true
      - uses: actions/upload-artifact@v7
        with:
          name: wheels
          path: target/wheels/*.whl
          if-no-files-found: error

  # --- HELD publish: release-tag gated, never on a normal merge --------------
  publish:
    needs: build
    # Fires only for a published release on a tag ref. Mirrors release-plz's
    # human-gated model — no auto-publish on merge.
    if: github.event_name == 'release' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with: { name: wheels, path: wheels }
      - uses: PyO3/maturin-action@v1.51.0
        env:
          # PYPI_TOKEN is provisioned as a repo secret at release time (it does
          # not exist yet — and cannot redden pre-release CI, since only this
          # release-gated job references it). Parallels release-plz.yml's
          # CARGO_REGISTRY_TOKEN for crates.io.
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing wheels/*.whl
