name: release-plz

# PR-based releases: on push to main, release-plz opens/updates a release PR
# (version bumps + changelog). Merging that PR triggers the tag/publish run.
# Nothing publishes off a normal feature merge.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: release-plz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      # No dtolnay/rust-toolchain step: rust-toolchain.toml already pins stable,
      # and rustup auto-installs it when release-plz's action first calls cargo.
      # A second `rustup default` from the action would fight the file over which
      # pin wins (see the same note in ci.yml).
      - name: Run release-plz
        uses: release-plz/action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `purecard` publishes to crates.io on release; release-plz runs
          # `cargo publish` with this token when it cuts a release.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
