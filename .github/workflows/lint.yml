name: Lint
on:
  push: { branches: [main] }
  pull_request:
  merge_group:
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read   # paths-filter + commitlint read PR files/commits via the API
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      md: ${{ steps.filter.outputs.md }}
      actions: ${{ steps.filter.outputs.actions }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        # fetch-depth: 0 so paths-filter can diff a push against its base commit
        # locally; persist-credentials: false means it cannot fetch the base
        # over the network, and a depth-1 checkout lacks it.
        with: { persist-credentials: false, fetch-depth: 0 }
      - name: Filter changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            md:
              - '**/*.md'
              - '.markdownlint.yaml'
            actions:
              - '.github/**'
            scripts:
              - 'scripts/**'
              - '.github/workflows/lint.yml'
  markdownlint:
    needs: changes
    if: needs.changes.outputs.md == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { persist-credentials: false }
      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: '**/*.md'
  commitlint:
    # Runs on every PR (all PRs have commits); harmless on push.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Lint commit messages
        uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
  actionlint:
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write   # reviewdog's github-check reporter needs this
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { persist-credentials: false }
      - name: Lint workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          reporter: github-check
          fail_level: error
  zizmor:
    # Static-analyses the workflows for security issues; the unpinned-uses audit
    # enforces SHA-pinned `uses:` going forward. Any finding fails the job;
    # accepted exceptions live in .github/zizmor.yml (auto-discovered).
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # online audits query action metadata via github.token
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { persist-credentials: false }
      # First-party Action (constitution §2: prefer official Actions; they cache
      # their own install). Pins the zizmor CLI to the .mise.toml version so the
      # gate matches `just zizmor`. advanced-security: false makes a finding fail
      # the job via exit code (the SARIF/code-scanning path does not fail builds).
      - name: Audit workflows (zizmor)
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
        with:
          version: 1.26.1
          advanced-security: false
          persona: regular
  test-scripts:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { persist-credentials: false }
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      - name: Test scripts
        run: bun test scripts/
  lint-gate:
    name: lint-gate
    needs: [changes, markdownlint, commitlint, actionlint, zizmor, test-scripts]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any lint job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
