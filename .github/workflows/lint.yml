name: Lint
on:
  push: { branches: [main] }
  pull_request:
  merge_group:
concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: read   # paths-filter + commitlint read PR files/commits via the API
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      md: ${{ steps.filter.outputs.md }}
      actions: ${{ steps.filter.outputs.actions }}
      scripts: ${{ steps.filter.outputs.scripts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        # fetch-depth: 0 so paths-filter can diff a push against its base commit
        # locally; persist-credentials: false means it cannot fetch the base
        # over the network, and a depth-1 checkout lacks it.
        with: { persist-credentials: false, fetch-depth: 0 }
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4
        id: filter
        with:
          filters: |
            md:
              - '**/*.md'
              - '.markdownlint.yaml'
            actions:
              - '.github/**'
            scripts:
              - 'scripts/**'
              - '.github/workflows/lint.yml'
  markdownlint:
    needs: changes
    if: needs.changes.outputs.md == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24
        with:
          globs: '**/*.md'
  commitlint:
    # Runs on every PR (all PRs have commits); harmless on push.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6
  actionlint:
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write   # reviewdog's github-check reporter needs this
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          reporter: github-check
          fail_level: error
  zizmor:
    # Static-analyses the workflows for security issues; the unpinned-uses audit
    # enforces SHA-pinned `uses:` going forward. Any finding fails the job;
    # accepted exceptions live in .github/zizmor.yml (auto-discovered).
    needs: changes
    if: needs.changes.outputs.actions == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read # online audits query action metadata via github.token
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      # First-party Action (constitution §2: prefer official Actions; they cache
      # their own install). Pins the zizmor CLI to the .mise.toml version so the
      # gate matches `just zizmor`. advanced-security: false makes a finding fail
      # the job via exit code (the SARIF/code-scanning path does not fail builds).
      - uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: 1.26.1
          advanced-security: false
          persona: regular
  test-scripts:
    needs: changes
    if: needs.changes.outputs.scripts == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: { persist-credentials: false }
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - run: bun test scripts/
  lint-gate:
    name: lint-gate
    needs: [changes, markdownlint, commitlint, actionlint, zizmor, test-scripts]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any lint job failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
