name: Security

# Scheduled + on-demand security scans: secret scanning (gitleaks) and
# advisory scanning (cargo-audit). Runs on PRs, on push to main, and weekly so
# newly-disclosed advisories are caught even without a code change.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Every Monday 05:00 UTC.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      # The gitleaks CLI is free; the gitleaks-action wrapper requires a paid
      # license on GitHub organization accounts. Install the version pinned in
      # .mise.toml via mise rather than a bespoke curl|tar shell pipeline.
      - name: Install gitleaks (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install_args: gitleaks
      - name: gitleaks
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml

  audit:
    name: cargo-audit (advisories)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Cache Rust build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install cargo-audit
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit --deny warnings
