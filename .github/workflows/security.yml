name: Security

# Scheduled + on-demand security scans: secret scanning (gitleaks) and
# advisory scanning (cargo-audit). Runs on PRs, on push to main, and weekly so
# newly-disclosed advisories are caught even without a code change.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Every Monday 05:00 UTC.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks (secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      # The gitleaks CLI is free; the gitleaks-action wrapper requires a paid
      # license on GitHub organization accounts. Install the version pinned in
      # .mise.toml via mise rather than a bespoke curl|tar shell pipeline.
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install_args: gitleaks
      - name: gitleaks
        run: gitleaks detect --no-banner --redact --config .gitleaks.toml

  audit:
    name: cargo-audit (advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
      - uses: taiki-e/install-action@2ca9b94c269419b7b0c711c09d0b21c4e1d51145 # v2.83.1
        with:
          tool: cargo-audit
      - name: cargo audit
        run: cargo audit --deny warnings
