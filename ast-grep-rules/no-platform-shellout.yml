# Portability guardrail: automation may shell out ONLY to a genuine external
# tool the workspace depends on — never to a platform-specific coreutils-style
# binary.
#
# constitution.md §2 "Portable automation — favor built-in functions" requires an
# in-process function over shelling out to a binary that is absent or different
# across OSes (macOS ships `shasum`, not `sha256sum`; BSD `date`/`sed` differ from
# GNU). This is an ALLOWLIST, not a denylist: it flags every string-literal
# program name that is NOT one of the vetted external tools (`cargo`, `git`,
# `ast-grep`). A denylist would only close the class of binaries someone
# already thought of — the same failure mode that let a `date` shell-out slip in
# before a rule existed (§5 "fix the system, not the instance"). Dynamic
# (non-literal) program names are left to review, not flagged here.
id: no-platform-shellout
message: "Automation may shell out only to a vetted external tool (cargo/git/ast-grep). Use a built-in / in-process Rust function instead of a platform-specific binary (constitution §2 'portable automation'); if this is a genuine new external tool, add it to the allowlist in ast-grep-rules/no-platform-shellout.yml."
severity: error
language: rust
rule:
  any:
    - pattern: run($BIN, $$$)
    - pattern: run_stdout($BIN, $$$)
constraints:
  BIN:
    kind: string_literal
    not:
      regex: '^"(cargo|git|ast-grep)"$'
files:
  - "xtask/**/*.rs"
